<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sem conexão — Family Pet Shop</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fa;
      color: #1a5276;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 40px 32px;
      max-width: 420px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #555; margin-bottom: 24px; }
    button {
      background: #1a5276;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>Não foi possível carregar esta página porque não há conexão com a internet. Tente novamente quando a conexão for restabelecida.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
