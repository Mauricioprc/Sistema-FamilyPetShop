<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Family Pet Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { background-color: #f5f5f5; }
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="card login-card p-4">
      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='Design sem nome.png') }}" alt="Family Pet Shop" style="height:64px;" loading="lazy">
        <p class="text-muted mt-2 mb-0" style="font-size:14px;">Sistema de Gestão</p>
      </div>

      {% from 'components/alert.html' import flash_messages %}
      {{ flash_messages() }}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="username" class="form-label fw-medium">Usuário</label>
          <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label fw-medium">Senha</label>
          <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="lembrar" name="lembrar">
          <label class="form-check-label text-muted" for="lembrar">Lembrar de mim</label>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 py-2">Entrar</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
