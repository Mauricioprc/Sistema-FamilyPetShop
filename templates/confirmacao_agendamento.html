<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitação Enviada | Family Pet Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { background-color: #f8f9fa; }
    .success-card { max-width: 600px; margin: 0 auto; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 40px 20px; background: white; }
    .mascote-sucesso { height: 200px; width: auto; margin-bottom: 20px; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.1)); }
    .btn-luxo { background: linear-gradient(145deg, var(--brand-gold), var(--brand-gold-dark)) !important; color: #fff !important; border: none !important; border-radius: 12px !important; padding: 15px 35px !important; font-weight: 700 !important; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(184,149,46,0.3) !important; transition: all 0.3s ease !important; text-decoration: none; display: inline-block; }
    .btn-luxo:hover { transform: translateY(-2px) !important; color: #fff !important; }
    .custom-alert { background-color: #fdfaf0; color: #1A1A1A; border-left: 5px solid var(--brand-gold) !important; border: 1px solid var(--brand-gold); border-radius: 8px; max-width: 480px; margin: 0 auto 1.5rem; }
  </style>
</head>
<body>
  <header class="header-comemorativo">
    <div class="container">
      <img src="{{ url_for('static', filename='Design sem nome.jpg') }}" alt="Family Pet Shop 10 Anos" class="logo-10-anos" loading="lazy">
    </div>
  </header>

  <div class="container pb-5">
    <div class="success-card text-center">
      <img src="{{ url_for('static', filename='mascote_patalevantada .png') }}" alt="Mascote" class="mascote-sucesso" loading="lazy">
      <h1 class="fw-bold mb-2" style="color:#1A1A1A;">Solicitação Enviada!</h1>
      <p class="fs-5 text-muted mb-4">Obrigado! O seu pedido de agendamento chegou até nós.</p>

      <div class="alert custom-alert shadow-sm text-start">
        <div class="d-flex align-items-center">
          <i class="bi bi-whatsapp fs-3 me-3" style="color:var(--brand-gold);"></i>
          <div>
            <strong>Fique atento:</strong> Confirmaremos a data, valores, forma de pagamento e horário através do seu WhatsApp em breve.
          </div>
        </div>
      </div>

      <a href="{{ url_for('publico.solicitar_agendamento') }}" class="btn-luxo">
        Fazer outra solicitação
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
