{% extends 'base.html' %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Registrar Novo Atendimento</h1>
    <a href="{{ url_for('agenda_do_dia') }}" class="btn btn-secondary">Cancelar</a>
  </div>

  {# --- NOVO SELETOR DE ABAS --- #}
  <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="pills-avulso-tab" data-bs-toggle="pill" data-bs-target="#pills-avulso" type="button" role="tab">
        <i class="bi bi-cash"></i> Atendimento Avulso
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="pills-pacote-tab" data-bs-toggle="pill" data-bs-target="#pills-pacote" type="button" role="tab">
        <i class="bi bi-box-seam"></i> Usar Crédito de Pacote
      </button>
    </li>
  </ul>
  
  <form method="POST">
    <div class="tab-content" id="pills-tabContent">
      {# --- ABA DO FORMULÁRIO AVULSO --- #}
      <div class="tab-pane fade show active" id="pills-avulso" role="tabpanel">
        <div class="card shadow-sm">
          <div class="card-body">
            <input type="hidden" name="tipo_atendimento" value="avulso">
            <div class="mb-3">
              <label for="cliente_id_avulso" class="form-label">Cliente (Pet):</label>
              <select name="cliente_id" id="cliente_id_avulso" class="form-select select-com-busca" style="width: 100%;">
                <option></option> 
                {% for cliente in clientes %}
                  <option value="{{ cliente.id }}">{{ cliente.nome_tutor }} (Pet: {{ cliente.nome_pet }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label for="data" class="form-label">Data do Atendimento:</label>
              <input type="date" id="data" name="data" class="form-control">
            </div>
            <div class="row mb-3">
                <div class="col-md-8">
                    <label class="form-label">Serviço:</label>
                    <div>
                      <div class="form-check form-check-inline">
                          <input class="form-check-input" type="radio" name="servico" id="servico_banho" value="Banho" checked>
                          <label class="form-check-label" for="servico_banho">Banho</label>
                      </div>
                      <div class="form-check form-check-inline">
                          <input class="form-check-input" type="radio" name="servico" id="servico_tosa" value="Tosa">
                          <label class="form-check-label" for="servico_tosa">Tosa</label>
                      </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="preco" class="form-label">Preço (R$):</label>
                    <input type="text" name="preco" id="preco" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label for="obs_avulso" class="form-label">Observações:</label>
                <textarea name="obs_avulso" id="obs_avulso" class="form-control" rows="2"></textarea>
            </div>
          </div>
        </div>
      </div>

      {# --- ABA DO FORMULÁRIO DE PACOTE --- #}
      <div class="tab-pane fade" id="pills-pacote" role="tabpanel">
        <div class="card shadow-sm">
          <div class="card-body">
            <input type="hidden" name="tipo_atendimento" value="pacote" disabled>
            <div class="mb-3">
              <label for="pacote_id" class="form-label">Selecione o Pacote Ativo:</label>
              <select name="pacote_id" id="pacote_id" class="form-select">
                <option value="" disabled selected>-- Escolha um pacote --</option>
                {% for pacote in pacotes %}
                  <option value="{{ pacote.id }}">{{ pacote.cliente.nome_tutor }} - ({{ pacote.nome_servico }}, {{pacote.creditos_usados}}/{{pacote.creditos_totais}})</option>
                {% endfor %}
              </select>
              {# --- FEEDBACK INTERATIVO DOS CRÉDITOS --- #}
              <div id="creditos-info" class="form-text mt-2 fw-bold"></div>
            </div>
            <div class="mb-3">
              <label for="data_pacote" class="form-label">Data do Atendimento:</label>
              <input type="date" id="data_pacote" name="data_pacote" class="form-control">
            </div>
            <div class="mb-3">
                <label for="obs_pacote" class="form-label">Observações:</label>
                <textarea name="obs_pacote" id="obs_pacote" class="form-control" rows="2"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-outline-orange-custom">Registrar Atendimento</button>
    </div>
  </form>
{% endblock %}

{% block scripts %}
<script>
    // Converte os dados do Python para um objeto JavaScript
    const pacotesInfo = {{ pacotes_info|tojson }};
    
    // Elementos do DOM
    const avulsoTab = document.getElementById('pills-avulso-tab');
    const pacoteTab = document.getElementById('pills-pacote-tab');
    const avulsoPane = document.getElementById('pills-avulso');
    const pacotePane = document.getElementById('pills-pacote');
    const selectPacote = document.getElementById('pacote_id');
    const creditosInfoDiv = document.getElementById('creditos-info');

    // NOVO: Máscara para o campo de preço avulso
    const precoAvulsoInput = document.getElementById('preco');
    const maskOptions = {
        mask: 'R$ num',
        blocks: {
            num: {
                mask: Number,
                scale: 2,
                thousandsSeparator: '.',
                padFractionalZeros: true,
                radix: ','
            }
        }
    };
    const mask = IMask(precoAvulsoInput, maskOptions);


    // Função para gerir os campos obrigatórios e inputs escondidos
    function handleTabChange() {
        if (avulsoTab.classList.contains('active')) {
            // Habilita inputs de avulso, desabilita de pacote
            avulsoPane.querySelectorAll('input, select, textarea').forEach(el => el.disabled = false);
            pacotePane.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
            // Garante que os campos obrigatórios de avulso são validados
            document.getElementById('cliente_id_avulso').required = true;
            document.getElementById('preco').required = true;
            document.getElementById('data').required = true;
        } else {
            // Habilita inputs de pacote, desabilita de avulso
            avulsoPane.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
            pacotePane.querySelectorAll('input, select, textarea').forEach(el => el.disabled = false);
            // Remove a obrigatoriedade dos campos de avulso
            document.getElementById('cliente_id_avulso').required = false;
            document.getElementById('preco').required = false;
            document.getElementById('data').required = false;
        }
    }
    
    // Função para mostrar os créditos
    function updateCreditosInfo() {
        const selectedPacoteId = selectPacote.value;
        if (selectedPacoteId && pacotesInfo[selectedPacoteId]) {
            const info = pacotesInfo[selectedPacoteId];
            creditosInfoDiv.innerHTML = `Créditos restantes: <span class="text-primary">${info.totais - info.usados} de ${info.totais}</span>`;
        } else {
            creditosInfoDiv.innerHTML = '';
        }
    }

    // Event Listeners
    avulsoTab.addEventListener('shown.bs.tab', handleTabChange);
    pacoteTab.addEventListener('shown.bs.tab', handleTabChange);
    selectPacote.addEventListener('change', updateCreditosInfo);

    // Inicialização
    $(document).ready(function() {
        $('.select-com-busca').select2({
            placeholder: "Digite para pesquisar o nome do tutor ou do pet...",
            allowClear: true
        });
        handleTabChange(); // Define o estado inicial correto dos formulários
    });
</script>
{% endblock %}
