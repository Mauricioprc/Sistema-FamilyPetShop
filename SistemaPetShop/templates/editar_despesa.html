{% extends 'base.html' %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Editar Despesa</h1>
    <a href="{{ url_for('listar_despesas') }}" class="btn btn-secondary">Cancelar</a>
  </div>
  
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <form method="POST" class="mt-2">
            <div class="mb-4">
              <label class="form-label d-block">Tipo de Despesa:</label>
              <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="tipo" id="tipo_petshop" value="PETSHOP" {% if despesa.tipo == 'PETSHOP' %}checked{% endif %} autocomplete="off">
                <label class="btn btn-outline-primary" for="tipo_petshop"><i class="bi bi-shop"></i> PETSHOP</label>
                
                <input type="radio" class="btn-check" name="tipo" id="tipo_casa" value="CASA" {% if despesa.tipo == 'CASA' %}checked{% endif %} autocomplete="off">
                <label class="btn btn-outline-secondary" for="tipo_casa"><i class="bi bi-house-door-fill"></i> CASA</label>

                <input type="radio" class="btn-check" name="tipo" id="tipo_leticia" value="LETICIA" {% if despesa.tipo == 'LETICIA' %}checked{% endif %} autocomplete="off">
                <label class="btn btn-outline-info" for="tipo_leticia">LETICIA</label>
    
                <input type="radio" class="btn-check" name="tipo" id="tipo_eduarda" value="EDUARDA" {% if despesa.tipo == 'EDUARDA' %}checked{% endif %} autocomplete="off">
                <label class="btn btn-outline-success" for="tipo_eduarda">EDUARDA</label>
              </div>
            </div>

            <div class="mb-3">
              <label for="descricao" class="form-label">Descrição:</label>
              <input type="text" id="descricao" name="descricao" class="form-control" value="{{ despesa.descricao }}" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="data" class="form-label">Data da Despesa:</label>
                <input type="date" id="data" name="data" class="form-control" value="{{ despesa.data.strftime('%Y-%m-%d') }}" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="valor" class="form-label">Valor (R$):</label>
                <input type="text" id="valor" name="valor" class="form-control" value="{{ "%.2f"|format(despesa.valor) }}" required>
              </div>
            </div>

            <button type="submit" class="btn btn-success mt-3">Salvar Alterações</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
<script>
  // Script para ativar a máscara de moeda no campo de valor
  const valorInput = document.getElementById('valor');
  const maskOptions = {
    mask: 'R$ num',
    blocks: {
      num: {
        mask: Number,
        scale: 2,
        thousandsSeparator: '.',
        padFractionalZeros: true,
        radix: ','
      }
    }
  };
  const mask = IMask(valorInput, maskOptions);
</script>
{% endblock %}
