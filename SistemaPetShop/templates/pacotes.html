{% extends 'base.html' %}

{% block content %}
  <form method="GET" action="{{ url_for('listar_pacotes') }}" class="mb-4">
    <input type="hidden" name="filtro" value="{{ filtro_ativo or 'ativos' }}">
    <div class="input-group">
      <input type="text" name="q" class="form-control" placeholder="Pesquisar por nome do tutor ou do pet..." value="{{ query or '' }}">
      <button class="btn btn-outline-orange-custom" type="submit">Pesquisar</button>
    </div>
  </form>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Pacotes Contratados</h1>
    <a href="{{ url_for('novo_pacote') }}" class="btn btn-primary-custom">Vender Novo Pacote</a>
  </div>

  <div class="mb-3 btn-group" role="group">
    <a href="{{ url_for('listar_pacotes', filtro='todos', q=query) }}" class="btn {% if filtro_ativo == 'todos' %}btn-dark{% else %}btn-outline-dark{% endif %}">TODOS</a>
    <a href="{{ url_for('listar_pacotes', filtro='ativos', q=query) }}" class="btn {% if filtro_ativo == 'ativos' or not filtro_ativo %}btn-dark{% else %}btn-outline-dark{% endif %}">ATIVOS</a>
    <a href="{{ url_for('listar_pacotes', filtro='concluidos', q=query) }}" class="btn {% if filtro_ativo == 'concluidos' %}btn-dark{% else %}btn-outline-dark{% endif %}">CONCLUÍDOS</a>
  </div>
  
  <div class="row">
    {% for pacote in pacotes %}
      <div class="col-lg-6 mb-4">
        {% include 'includes/card_pacote_geral.html' %}
      </div>
    {% else %}
      <div class="col-12">
        <div class="alert alert-light">Nenhum pacote encontrado para este filtro.</div>
      </div>
    {% endfor %}
  </div>

{% endblock %}
