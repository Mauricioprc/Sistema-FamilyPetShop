{% extends 'base.html' %}

{% block content %}
  <h1>Editar Cliente</h1>
  
  <form method="POST" class="mt-4">
    <div class="row">
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">
            <h5><i class="bi bi-person-fill"></i> Dados do Tutor</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label for="nome_tutor" class="form-label">Nome do Tutor:</label>
              <input type="text" id="nome_tutor" name="nome_tutor" class="form-control" value="{{ cliente.nome_tutor }}" required>
            </div>
            <div class="mb-3">
              <label for="telefone" class="form-label">Telefone:</label>
              <input type="text" id="telefone" name="telefone" class="form-control" value="{{ cliente.telefone }}" required>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">
            <h5><i class="bi bi-heart-fill"></i> Dados do Pet</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label for="nome_pet" class="form-label">Nome do Pet:</label>
              <input type="text" id="nome_pet" name="nome_pet" class="form-control" value="{{ cliente.nome_pet }}" required>
            </div>
            <div class="mb-3">
              <label for="raca_pet" class="form-label">Raça do Pet:</label>
              <input type="text" id="raca_pet" name="raca_pet" class="form-control" value="{{ cliente.raca_pet }}">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-success">Salvar Alterações</button>
      <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
{% endblock %}

{% block scripts %}
<script>
  // Script para ativar a máscara de telefone
  const phoneInput = document.getElementById('telefone');
  const maskOptions = {
    mask: '(00) 00000-0000'
  };
  const mask = IMask(phoneInput, maskOptions);
</script>
{% endblock %}
